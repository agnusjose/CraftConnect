<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .chat-container {
            width: 50%;
            height: 80%;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 10px;
            background-color: #4D0F28;
            color: white;
            text-align: center;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: scroll;
            background-color: #f1f1f1;
        }
        .chat-message {
            margin-bottom: 10px;
        }
        .chat-message.customer {
            text-align: left;
            color: blue;
        }
        .chat-message.manufacturer {
            text-align: right;
            color: green;
        }
        .chat-input-container {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }
        .chat-input-container input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .chat-input-container button {
            padding: 10px;
            margin-left: 10px;
            background-color: #4D0F28;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Chat with {{ manufacturer_name }}</h2> <!-- Added dynamic manufacturer name -->
        </div>
        <div class="chat-box" id="chat-box">
            <!-- Messages will be dynamically added here -->
            {% for message in chat_messages %}
                <div class="chat-message {{ message.sender }}">
                    <strong>{{ message.sender }}:</strong> {{ message.content }}
                </div>
            {% endfor %}
        </div>
        <div class="chat-input-container">
            <input type="text" id="chat-message" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Initialize Socket.IO
        var socket = io.connect('http://' + document.domain + ':' + location.port);

        // Listen for incoming messages
        socket.on('receive_message', function(msg) {
            var chatBox = document.getElementById('chat-box');
            var messageDiv = document.createElement('div');
            messageDiv.classList.add('chat-message');
            messageDiv.classList.add(msg.sender);  // 'customer' or 'manufacturer'
            messageDiv.innerHTML = `<strong>${msg.sender}:</strong> ${msg.message}`;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;  // Auto-scroll to bottom
        });

        // Send message to the server
        function sendMessage() {
            var messageInput = document.getElementById('chat-message');
            var message = messageInput.value;
            if (message.trim() !== "") {
                socket.emit('send_message', {message: message, sender: 'customer'});  // You can adjust 'sender' based on user type
                messageInput.value = '';  // Clear input after sending
            }
        }
    </script>
</body>
</html>
