<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .chat-container {
            width: 50%;
            height: 80%;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 10px;
            background-color: #4D0F28;
            color: white;
            text-align: center;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: scroll;
            background-color: #f1f1f1;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            max-width: 60%;
            clear: both;
        }
        .chat-message.sender {
            background-color: #4D0F28;
            color: white;
            float: right;
            text-align: right;
        }
        .chat-message.receiver {
            background-color: #e0e0e0;
            color: black;
            float: left;
            text-align: left;
        }
        .chat-input-container {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }
        .chat-input-container input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .chat-input-container button {
            padding: 10px;
            margin-left: 10px;
            background-color: #4D0F28;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Chat</h2>
        </div>
        <div class="chat-box" id="chat-box">
            <!-- Messages will be dynamically added here -->
            {% for message in chat_messages %}
                <div class="chat-message {% if message.sender == 'self' %}sender{% else %}receiver{% endif %}">
                    {{ message.message }}
                </div>
            {% endfor %}
        </div>
        <div class="chat-input-container">
            <input type="text" id="chat-message" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        var socket = io();
        var chatContainer = document.getElementById("chat-container");
    
        // Function to append new messages
        function addMessage(sender, message) {
            var messageDiv = document.createElement("div");
            messageDiv.classList.add(sender === "self" ? "message-self" : "message-other");
            messageDiv.innerHTML = `<strong>${sender === "self" ? "You" : "Other"}:</strong> ${message}`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;  // Auto-scroll
        }
    
        // Load chat history from the database
        var chatMessages = JSON.parse('{{ chat_messages | tojson | safe }}');
        chatMessages.forEach(msg => {
            addMessage(msg.sender, msg.message);
        });
    
        // Handle incoming messages via Socket.IO
        socket.on('receive_message', function(data) {
            addMessage(data.sender, data.message);
        });
    
        // Sending a message
        function sendMessage() {
            var messageInput = document.getElementById("message-input");
            var message = messageInput.value.trim();
            if (message === "") return;
    
            var data = {
                message: message,
                sender: "self",  // Always mark as self before sending
                manufacturer_id: "{{ manufacturer_id }}",
                customer_id: "{{ customer_id }}"
            };
    
            // Send to server
            socket.emit('send_message', data);
    
            // Send message to backend to store in database
            fetch("/send_message", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
    
            // Clear input field
            messageInput.value = "";
        }
    </script>
    
</body>
</html>
