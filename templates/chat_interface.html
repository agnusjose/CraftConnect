<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .chat-container {
            width: 50%;
            height: 80%;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 10px;
            background-color: #4D0F28;
            color: white;
            text-align: center;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: scroll;
            background-color: #f1f1f1;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            max-width: 60%;
            clear: both;
        }
        .chat-message.sender {
            background-color: #4D0F28;
            color: white;
            float: right;
            text-align: right;
        }
        .chat-message.receiver {
            background-color: #e0e0e0;
            color: black;
            float: left;
            text-align: left;
        }
        .chat-input-container {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }
        .chat-input-container input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .chat-input-container button {
            padding: 10px;
            margin-left: 10px;
            background-color: #4D0F28;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Chat</h2>
        </div>
        <div class="chat-box" id="chat-box"></div>
        <div class="chat-input-container">
            <input type="text" id="chat-message" placeholder="Type your message...">
            <input type="file" id="image-input" accept="image/*">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        var socket = io();
        var chatBox = document.getElementById("chat-box");
        var roomId = "{{ manufacturer_id }}_{{ customer_id }}";
        var userType = "{{ user_type }}";  // "manufacturer" or "customer" from the backend
        var receivedMessages = new Set();  // To prevent duplicate messages

        // Join the room
        socket.emit('join_room', roomId);

        // Function to append new messages
        function addMessage(sender, message, is_sender, messageId, isImage = false, image_url = null) {
            if (messageId && receivedMessages.has(messageId)) return;
            if (messageId) receivedMessages.add(messageId);

            var messageDiv = document.createElement("div");
            messageDiv.classList.add("chat-message");
            messageDiv.classList.add(is_sender ? "sender" : "receiver");

            if (isImage && image_url) {
                var img = document.createElement("img");
                img.src = image_url;
                img.style.maxWidth = "200px";
                img.alt = "Image message";
                messageDiv.appendChild(img);
            } else {
                messageDiv.textContent = message;
            }

            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;  // Scroll to the bottom
        }

        // Load chat history once
        var chatMessages = JSON.parse('{{ chat_messages | tojson | safe }}');
        chatMessages.forEach(function(msg) {
            addMessage(msg.sender_role, msg.message, msg.is_sender, msg.id, msg.is_image, msg.image_url);
        });

        // Receive new messages from the server
        var roomId = "{{ manufacturer_id }}_{{ customer_id }}";  // Ensure room ID is correct
socket.emit('join_room', roomId);

// Listen for real-time messages
socket.on('receive_message', function(data) {
    if (data.is_image) {
        addMessage(data.sender, null, data.is_sender, Date.now(), true, data.message);  // Image message
    } else {
        addMessage(data.sender, data.message, data.is_sender, Date.now(), false);  // Text message
    }
});

        // Send a message
// Function to send messages (adjustment here)
function sendMessage() {
    var messageInput = document.getElementById("chat-message");
    var imageInput = document.getElementById("image-input");

    var message = messageInput.value.trim();
    var imageFile = imageInput.files[0];  // Get the file from the input field

    var data = {
        message: message,
        sender: userType,  // 'manufacturer' or 'customer'
        manufacturer_id: "{{ manufacturer_id }}",
        customer_id: "{{ customer_id }}",
        is_image: imageFile ? true : false
    };

    if (imageFile) {
        // Create FormData for the image upload
        var formData = new FormData();
        formData.append('image', imageFile);
        formData.append('message_data', JSON.stringify(data));

        // Use XMLHttpRequest or fetch API to upload the image
        var xhr = new XMLHttpRequest();
        xhr.open("POST", "/upload_image", true);  // Assuming you have a Flask route /upload_image
        xhr.onload = function () {
            if (xhr.status === 200) {
                var response = JSON.parse(xhr.responseText);
                data.message = response.image_url;
                data.is_image = true;

                // Only append the message for the sender locally, not via the socket response
                addMessage(userType, response.image_url, true, Date.now(), true, response.image_url);

                // Emit the image message via Socket.IO, but don't append it on receive for the sender
                socket.emit('send_message', data);
            }
        };

        xhr.send(formData);
    } else {
        // Emit text message via Socket.IO
        socket.emit('send_message', data);

        // Only append the text message for the sender locally
        addMessage(userType, message, true, Date.now(), false);
    }

    // Clear the input fields
    messageInput.value = "";
    imageInput.value = null;
}

// Receiving message from server (adjustment here)
// Receiving message from server
socket.on('receive_message', function(data) {
    // Prevent displaying duplicate message for the sender
    if (data.sender !== userType) {  // Check if the sender is not the current user
        if (data.is_image) {
            addMessage(data.sender, null, false, Date.now(), true, data.image_url);  // Image message for the receiver
        } else {
            addMessage(data.sender, data.message, false, Date.now(), false);  // Text message for the receiver
        }
    }
});


    </script>
</body>
</html>
