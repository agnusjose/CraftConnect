<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - CraftConnect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
        }

        .chat-container {
            display: flex;
            width: 90%;
            margin: auto;
            padding: 50px 0;
            align-items: center;
        }

        .chat-box {
            width: 60%;
            height: 400px;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #f9f9f9;
        }

        .message {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            max-width: 70%;
        }

        .sent {
            background: #007bff;
            color: white;
            align-self: flex-end;
        }

        .received {
            background: #ddd;
            color: black;
            align-self: flex-start;
        }

        .chat-input {
            display: flex;
            margin-top: 10px;
        }

        .chat-input input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .chat-input button {
            padding: 10px 15px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-box" id="chat-box">
            <!-- Messages will load here -->
        </div>

        <div class="chat-input">
            <input type="text" id="message" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const sender = "User1";  // Replace with logged-in user
        const receiver = "Manufacturer1";  // Replace with selected manufacturer

        function loadMessages() {
            fetch(`/get_messages?sender=${sender}&receiver=${receiver}`)
                .then(response => response.json())
                .then(messages => {
                    let chatBox = document.getElementById("chat-box");
                    chatBox.innerHTML = "";
                    messages.forEach(msg => {
                        let div = document.createElement("div");
                        div.classList.add("message");
                        div.classList.add(msg.sender === sender ? "sent" : "received");
                        div.innerText = msg.message;
                        chatBox.appendChild(div);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                });
        }

        function sendMessage() {
            let message = document.getElementById("message").value;
            if (message.trim() === "") return;

            fetch("/send_message", {
                method: "POST",
                body: JSON.stringify({ sender, receiver, message }),
                headers: { "Content-Type": "application/json" }
            }).then(() => {
                document.getElementById("message").value = "";
                loadMessages();
            });
        }

        // Auto-refresh messages every 3 seconds
        setInterval(loadMessages, 3000);

        // Load messages when page loads
        loadMessages();
    </script>

</body>
</html>
